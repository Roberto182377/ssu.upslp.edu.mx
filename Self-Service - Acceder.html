<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self Service - Acceso</title>
    <style>
        /* Estilos Generales y Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f4f4;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita el scroll */
        }

        /* Encabezado */
        header {
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            border-bottom: 3px solid #007A33; /* Franja verde institucional */
            border-top: 15px solid #00205B; /* Franja azul institucional */
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-placeholder {
            color: #00205B;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .header-title {
            color: #666;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .menu-icon {
            font-size: 1.5rem;
            color: #333;
            cursor: pointer;
        }

        /* Contenedor Principal (Fondo dividido) */
        .main-container {
            display: flex;
            flex: 1;
            position: relative;
        }

        /* Lado Izquierdo (Texto) */
        .left-side {
            flex: 1;
            background-color: #ffffff;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, #f9f9f9 2px, #f9f9f9 4px); /* Textura sutil de líneas */
        }

        .left-side h1 {
            font-size: 3.5rem;
            color: #333;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .left-side h1 span.green {
            color: #007A33;
            font-weight: bold;
        }

        /* Lado Derecho (Imagen) */
        .right-side {
            flex: 1;
            /* Aquí puedes cambiar la URL por una foto de las canchas o el gym de la uni */
            background-image: url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Efecto de difuminado entre las dos mitades */
        .gradient-overlay {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            width: 150px;
            background: linear-gradient(to right, #ffffff 0%, transparent 100%);
        }

        /* Cuadro de Login (Modal Flotante) */
        .login-box {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            padding: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            z-index: 20;
            text-align: center;
        }

        .login-box h2 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .login-box a.link {
            color: #0056b3;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-block;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #eef2f5;
            font-size: 1rem;
            color: #333;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #0056b3;
            background-color: #fff;
        }

        .show-pwd {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #555;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background-color: #0056b3;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .login-btn:hover {
            background-color: #004494;
        }

        .forgot-pwd {
            display: block;
            text-align: right;
            margin-top: 10px;
            font-size: 0.85rem;
        }

        /* Pie de página */
        footer {
            text-align: center;
            padding: 15px;
            font-size: 0.75rem;
            color: #777;
            background-color: #ffffff;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo-placeholder">UNIVERSIDAD<br>POLITÉCNICA</div>
            <div class="header-title">GIMNASIO UNIVERSITARIO</div>
        </div>
        <div class="menu-icon">☰</div>
    </header>

    <div class="main-container">
        <div class="left-side">
            <h1>Un <span class="green">Entrenamiento</span><br>con prestigio,<br>una <span class="green">salud</span><br>sin límites.</h1>
        </div>
        
        <div class="right-side">
            <div class="gradient-overlay"></div>
        </div>

        <div class="login-box">
            <h2>Iniciar sesión</h2>
            <a href="#" class="link">Utilizar otra cuenta</a>
            
            <form action="menu_gimnasio.html" method="GET">
                <div class="input-group">
                    <label>Nombre de usuario</label>
                    <div class="input-wrapper">
                        <!-- Dejé tu matrícula como placeholder para visualizarlo -->
                        <input type="text" value="0182377" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" value="********" required>
                        <button type="button" class="show-pwd">Mostrar</button>
                    </div>
                </div>

                <a href="#" class="link forgot-pwd">¿Olvidó su contraseña?</a>

                <button type="submit" class="login-btn">INICIAR SESIÓN</button>
            </form>
        </div>
    </div>

    <footer>
        Sistema de Gestión Deportiva - Módulo de Estudiantes.
    </footer>

</body>
</html>
